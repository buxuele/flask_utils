{% extends "base.html" %} {% block title %}图片上传 - Flask 工具集{% endblock %}
{% block extra_css %}
<style>
  .upload-area {
    border: 2px dashed #ccc;
    border-radius: 5px;
    padding: 20px;
    text-align: center;
    background: #f8f9fa;
    transition: all 0.3s ease;
  }
  .upload-area.dragover {
    background: #e3f2fd;
    border-color: #2196f3;
  }
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
    margin-top: 20px;
  }
  .preview-item {
    position: relative;
    padding: 10px;
    border: 1px solid #dee2e6;
    border-radius: 5px;
  }
  .preview-image {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 3px;
  }
  .preview-info {
    margin-top: 10px;
    font-size: 0.9em;
  }
</style>
{% endblock %} {% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <h2 class="text-center mb-4">图片上传工具</h2>
        <div class="card">
            <div class="card-body">
                <form
                        action="/upload"
                        method="post"
                        enctype="multipart/form-data"
                        id="uploadForm"
                >
                    <div class="upload-area" id="dropZone">
                        <p class="mb-2">拖放图片到此处或点击选择文件</p>
                        <input
                                type="file"
                                class="form-control"
                                name="images"
                                multiple
                                accept="image/*"
                        />
                    </div>
                    <div class="preview-grid" id="previewArea"></div>
                    <button type="submit" class="btn btn-primary mt-3">上传图片</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  // 等实现具体功能时再添加JavaScript代码
</script>
{% endblock %}
